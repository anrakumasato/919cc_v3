services:
  frontend:
    build:
      context: ./frontend
      target: production
    environment:
      - API_BASE_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
      target: production
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_public:/var/www/html/public
    restart: always

  nginx:
    build:
      context: ./docker/nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - backend_public:/var/www/html/public
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  backend_vendor:
  backend_public:
